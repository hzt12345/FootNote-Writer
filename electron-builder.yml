appId: com.footnotewriter.app
productName: FootNote Writer
directories:
  output: release
files:
  - dist/**/*
  - node_modules/**/*
mac:
  icon: build/icons/icon.icns
  target:
    - dmg
  category: public.app-category.productivity
win:
  icon: build/icons/icon.ico
  target:
    - nsis
nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
