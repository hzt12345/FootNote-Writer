name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: windows-latest
            platform: win
          - os: macos-latest
            platform: mac
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Package
        run: npx electron-builder --publish never
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Smoke test
        shell: bash
        run: |
          npx electron ./dist/main/main/index.js --smoke-test
        timeout-minutes: 2
        env:
          ELECTRON_ENABLE_LOGGING: 1

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: FootNote-Writer-${{ matrix.platform }}
          path: |
            release/*.exe
            release/*.dmg
            release/*.zip
          if-no-files-found: warn

  api-test:
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: API smoke test
        run: node scripts/api-smoke-test.mjs
        timeout-minutes: 3
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          QWEN_API_KEY: ${{ secrets.QWEN_API_KEY }}
          MINIMAX_API_KEY: ${{ secrets.MINIMAX_API_KEY }}
          MINIMAX_GROUP_ID: ${{ secrets.MINIMAX_GROUP_ID }}
          KIMI_API_KEY: ${{ secrets.KIMI_API_KEY }}

  release:
    needs: [build, api-test]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          draft: false
          generate_release_notes: true
          files: |
            artifacts/**/*.exe
            artifacts/**/*.dmg
            artifacts/**/*.zip

  hf-sync:
    needs: release
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Get tag name
        id: tag
        run: echo "TAG=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Install huggingface_hub
        run: pip install huggingface_hub

      - name: Upload to Hugging Face
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          TAG="${{ steps.tag.outputs.TAG }}"
          python3 - <<'PYEOF'
          import os, glob
          from huggingface_hub import HfApi, create_repo

          api = HfApi(token=os.environ["HF_TOKEN"])
          repo_id = "zth07/FootNote-Writer"

          # Create repo if not exists
          try:
              create_repo(repo_id, repo_type="model", token=os.environ["HF_TOKEN"], exist_ok=True)
          except Exception as e:
              print(f"Repo creation: {e}")

          # Delete old files in latest/ first
          try:
              files = api.list_repo_files(repo_id=repo_id, repo_type="model")
              old_files = [f for f in files if f.startswith("latest/")]
              if old_files:
                  operations = [{"path": f} for f in old_files]
                  from huggingface_hub import CommitOperationDelete
                  ops = [CommitOperationDelete(path_in_repo=f) for f in old_files]
                  api.create_commit(repo_id=repo_id, repo_type="model", operations=ops, commit_message="Clean old release files")
                  print(f"Cleaned {len(old_files)} old files")
          except Exception as e:
              print(f"Cleanup: {e}")

          # Upload all release files to latest/
          for pattern in ["artifacts/**/*.exe", "artifacts/**/*.dmg", "artifacts/**/*.zip"]:
              for filepath in glob.glob(pattern, recursive=True):
                  filename = os.path.basename(filepath)
                  print(f"Uploading {filename} ({os.path.getsize(filepath) // 1048576}MB)...")
                  api.upload_file(
                      path_or_fileobj=filepath,
                      path_in_repo=f"latest/{filename}",
                      repo_id=repo_id,
                      repo_type="model",
                      commit_message=f"Release latest: {filename}",
                  )
                  print(f"Done: https://huggingface.co/{repo_id}/resolve/main/latest/{filename}")
          PYEOF
