name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: windows-latest
            platform: win
          - os: macos-latest
            platform: mac
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Package
        run: npx electron-builder --publish never
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Smoke test
        shell: bash
        run: |
          npx electron ./dist/main/main/index.js --smoke-test
        timeout-minutes: 2
        env:
          ELECTRON_ENABLE_LOGGING: 1

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: FootNote-Writer-${{ matrix.platform }}
          path: |
            release/*.exe
            release/*.dmg
            release/*.zip
          if-no-files-found: warn

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          draft: false
          generate_release_notes: true
          files: |
            artifacts/**/*.exe
            artifacts/**/*.dmg
            artifacts/**/*.zip

  gitee-sync:
    needs: release
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Get tag name
        id: tag
        run: echo "TAG=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Create Gitee Release
        id: create_release
        continue-on-error: true
        run: |
          RESPONSE=$(curl -s -X POST \
            "https://gitee.com/api/v5/repos/${{ secrets.GITEE_OWNER }}/${{ secrets.GITEE_REPO }}/releases" \
            -H "Content-Type: application/json" \
            -d "{
              \"access_token\": \"${{ secrets.GITEE_TOKEN }}\",
              \"tag_name\": \"${{ steps.tag.outputs.TAG }}\",
              \"name\": \"${{ steps.tag.outputs.TAG }}\",
              \"body\": \"See GitHub Release for details.\"
            }")
          RELEASE_ID=$(echo "$RESPONSE" | jq -r '.id')
          if [ "$RELEASE_ID" = "null" ]; then
            RESPONSE=$(curl -s \
              "https://gitee.com/api/v5/repos/${{ secrets.GITEE_OWNER }}/${{ secrets.GITEE_REPO }}/releases/tags/${{ steps.tag.outputs.TAG }}?access_token=${{ secrets.GITEE_TOKEN }}")
            RELEASE_ID=$(echo "$RESPONSE" | jq -r '.id')
          fi
          echo "RELEASE_ID=$RELEASE_ID" >> $GITHUB_OUTPUT

      - name: Upload assets to Gitee
        continue-on-error: true
        run: |
          shopt -s globstar nullglob
          for file in artifacts/**/*.exe artifacts/**/*.dmg artifacts/**/*.zip; do
            [ -f "$file" ] || continue
            echo "Uploading $file..."
            curl -s -X POST \
              "https://gitee.com/api/v5/repos/${{ secrets.GITEE_OWNER }}/${{ secrets.GITEE_REPO }}/releases/${{ steps.create_release.outputs.RELEASE_ID }}/attach_files" \
              -H "Content-Type: multipart/form-data" \
              -F "access_token=${{ secrets.GITEE_TOKEN }}" \
              -F "file=@$file"
          done
